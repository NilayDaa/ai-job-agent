version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: ai-job-postgres

    environment:
      POSTGRES_DB: ai_jobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-job-redis

    ports:
      - "6379:6379"

  ai-job-agent:
    build: .

    container_name: ai-job-agent

    depends_on:
      - postgres
      - redis

    ports:
      - "8000:8000"

    environment:
      REDIS_HOST: redis

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data: